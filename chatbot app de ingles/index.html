<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite English Tutor AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        #chat-box { height: 450px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #f1f0f0; color: #333; border-bottom-left-radius: 2px; }
        .controls { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; justify-content: center; }
        button { background: #00c853; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00a042; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-box">
            <div class="msg bot">Hello! I am your Elite English Tutor Lexy. How can I help you today?</div>
        </div>
        <div class="controls">
            <button id="btn-listen">?? Tap to Speak</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const btnListen = document.getElementById('btn-listen');

        // EL SYSTEM PROMPT DE ╔LITE EST┴ AQU═:
        const ELITE_PROMPT = `Act as a Master English Tutor (CEFR Expert). 
        Rules: 
        1. Adapt to the user's level. 
        2. Correct grammar mistakes kindly: 'You said: [error] -> Better: [correction]'. 
        3. Use a Socratic method. 
        4. Maintain a natural conversation.`;

        let history = [{ role: "system", content: ELITE_PROMPT }];

        // VOZ: El bot habla (Gratis)
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; // Acento americano elegante
            utterance.rate = 0.9;    // Un poco mßs lento para entender mejor
            window.speechSynthesis.speak(utterance);
        }

        // ESCUCHAR: El usuario habla
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        btnListen.onclick = () => {
            btnListen.innerText = "Listening...";
            recognition.start();
        };

        recognition.onresult = async (event) => {
            const userText = event.results[0].transcript;
            btnListen.innerText = "?? Tap to Speak";
            addMessage(userText, 'user');
            
            history.push({ role: "user", content: userText });
            await getAIResponse();
        };

        async function getAIResponse() {
            // NOTA: AquĒ cambias la URL por tu funci¾n de Vercel cuando la tengas (/api/chat)
            // Por ahora, para probar local, puedes seguir usando el fetch directo a Groq
            const response = await fetch(" /api/chat", {
                method: "POST",
                headers: {  "Content-Type": "application/json"},
                 body: JSON.stringify({ messages: history })
 });    
                    
            const data = await response.json();
            const botText = data.choices[0].message.content;
            
            history.push({ role: "assistant", content: botText });
            addMessage(botText, 'bot');
            speak(botText);
        }

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
